name: CI/CD Tienda Perritos - DB (EKS)

on:
  push:
    branches: [ "deploy" ]
    paths:
      - "db/**"
      - "k8s/db.yml" # Detecta cambios en el manifiesto de la BD

jobs:
  build-push-deploy-db:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login en Amazon ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build y Push imagen DB a ECR
      run: |
        cd db
        docker build -t tienda-db .
        docker tag tienda-db:latest ${{ secrets.ECR_REPO_URL_DB }}:latest
        docker push ${{ secrets.ECR_REPO_URL_DB }}:latest

    - name: Actualizar Kubeconfig para EKS
      run: |
        aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name pruebaEKS

    - name: Deploy a Amazon EKS
      run: |
        # Aplica el manifiesto de la base de datos (asegúrate de que la ruta coincida)
        kubectl apply -f k8s/db.yml 
        
        # Reinicia el pod para capturar la nueva imagen 'latest'
        kubectl rollout restart deployment/tienda-db -n tienda
        kubectl rollout status deployment/tienda-db -n tienda