name: CI/CD Tienda Perritos - Backend (EKS)

on:
  push:
    branches: [ "deploy" ]
    paths:
      - "backend/**"
      - "k8s/**" # Detecta cambios si actualizas los archivos YAML

jobs:
  build-push-deploy-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login en Amazon ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build y Push imagen Backend a ECR
      run: |
        cd backend
        docker build -t tienda-backend .
        docker tag tienda-backend:latest ${{ secrets.ECR_REPO_URL_BACKEND }}:latest
        docker push ${{ secrets.ECR_REPO_URL_BACKEND }}:latest

    - name: Actualizar Kubeconfig para EKS
      run: |
        aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name pruebaEKS

    - name: Deploy a Amazon EKS
      run: |
        # Asumiendo que tus archivos YAML están en una carpeta llamada 'k8s'
        kubectl apply -f k8s/frontend.yml # Este es el archivo que subiste con el Deployment del backend
        
        # Fuerza el reinicio de los pods para asegurar que tomen la imagen 'latest' recién subida
        kubectl rollout restart deployment/tienda-backend -n tienda
        kubectl rollout status deployment/tienda-backend -n tienda