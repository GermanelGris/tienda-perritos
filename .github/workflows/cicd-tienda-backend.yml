name: CI/CD Tienda Perritos - Backend

on:
  push:
    branches: [ "deploy" ]
    paths:
      - "backend/**"

jobs:
  build-push-deploy-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login en Amazon ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build y Push imagen Backend a ECR
      run: |
        cd backend
        docker build -t tienda-backend .
        docker tag tienda-backend:latest ${{ secrets.ECR_REPO_URL_BACKEND }}:latest
        docker push ${{ secrets.ECR_REPO_URL_BACKEND }}:latest

    - name: Descargar task definition actual
      run: |
        aws ecs describe-task-definition \
          --task-definition tienda-backend-td \
          --query taskDefinition > task-definition-raw.json
        
        cat task-definition-raw.json | python3 -c "
        import json, sys
        td = json.load(sys.stdin)
        for key in ['taskDefinitionArn','revision','status','requiresAttributes',
                    'compatibilities','registeredAt','registeredBy','enableFaultInjection']:
            td.pop(key, None)
        print(json.dumps(td))
        " > task-definition-backend.json

    - name: Actualizar imagen en task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition-backend.json
        container-name: tienda-backend
        image: ${{ secrets.ECR_REPO_URL_BACKEND }}:latest

    - name: Deploy a ECS
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ secrets.ECS_SERVICE_BACKEND }}
        cluster: ${{ secrets.ECS_CLUSTER }}
        wait-for-service-stability: true